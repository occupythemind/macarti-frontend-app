<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .auth-panel--right { background: white; }
    .auth-form__logo { display: none; }
    .pwd-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); cursor: pointer; background: none; border: none; padding: 0;
      display: flex; align-items: center;
    }
    .pwd-toggle:hover { color: var(--gray-700); }
    @media (max-width: 768px) { .auth-form__logo { display: flex; margin-bottom: 24px; } }
    .form-label { display: flex; align-items: center; justify-content: space-between; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-panel auth-panel--left">
    <div class="content">
      <a href="/index.html" class="navbar__logo" style="margin-bottom:40px;display:flex">
        <div class="logo-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
        <span class="logo-text" style="color:white">Macarti<span style="color:var(--blue-300)">.</span></span>
      </a>
      <h2 class="auth-tagline">Welcome<br>back to<br><span>Macarti.</span></h2>
      <div class="auth-features">
        <div class="auth-feature"><div class="auth-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>Track your orders in real time</div>
        <div class="auth-feature"><div class="auth-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>Save items to your wishlist</div>
        <div class="auth-feature"><div class="auth-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>Secure, seamless checkout</div>
      </div>
    </div>
  </div>
  <div class="auth-panel auth-panel--right">
    <div class="auth-form">
      <div class="auth-form__logo">
        <a href="/index.html" class="navbar__logo"><div class="logo-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div><span class="logo-text">Macarti<span>.</span></span></a>
      </div>
      <h2>Sign in</h2>
      <p class="subtitle">Don't have an account? <a href="/pages/register.html">Create one free</a></p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email <span class="req">*</span></label>
          <input type="email" id="login-email" class="form-input" placeholder="you@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">
            <span>Password <span class="req">*</span></span>
            <a href="/pages/forgot-password.html" style="font-weight:400;color:var(--blue-500);font-size:.8rem">Forgot?</a>
          </label>
          <div style="position:relative">
            <input type="password" id="login-password" class="form-input" style="width:100%;padding-right:44px" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="pwd-toggle" id="toggle-pwd" title="Show/hide password">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn--primary btn--full btn--lg" id="login-btn">Sign In</button>
      </form>
      <div class="auth-divider" style="margin-top:4px">or continue with</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="oauth-btn" id="google-btn">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="oauth-btn" id="facebook-btn">
          <svg viewBox="0 0 24 24" fill="#1877F2" width="20" height="20"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Continue with Facebook
        </button>
      </div>
      <div class="auth-footer-link">New here? <a href="/pages/register.html">Create a free account</a></div>
    </div>
  </div>
</div>
<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
