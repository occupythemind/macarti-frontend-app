<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .wishlist-grid { display: grid; grid-template-columns: 240px 1fr; gap: 28px; align-items: start; }
    @media (max-width: 768px) { .wishlist-grid { grid-template-columns: 1fr; } }
    .wishlist-tab {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      font-size: .875rem; font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      border: none; background: none; text-align: left; width: 100%;
      transition: background var(--transition), color var(--transition);
      font-family: var(--font-body);
    }
    .wishlist-tab:hover { background: var(--gray-50); color: var(--blue-600); }
    .wishlist-tab.active { background: var(--blue-50); color: var(--blue-700); font-weight: 600; }
    .wishlist-tab svg { width: 16px; height: 16px; flex-shrink: 0; }
    .wishlist-tab .tab-count { margin-left: auto; background: var(--gray-200); color: var(--gray-600); padding: 1px 8px; border-radius: var(--radius-pill); font-size: .75rem; }
    .wishlist-tab.active .tab-count { background: var(--blue-200); color: var(--blue-700); }
    .wl-item {
      display: flex; gap: 14px; align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .wl-item:last-child { border: none; }
    .wl-item__img { width: 68px; height: 68px; border-radius: var(--radius-md); overflow: hidden; background: var(--gray-100); flex-shrink: 0; }
    .wl-item__img img { width: 100%; height: 100%; object-fit: cover; }
    .wl-item__info { flex: 1; min-width: 0; }
    .wl-item__name { font-weight: 600; color: var(--blue-900); font-size: .9375rem; }
    .wl-item__meta { font-size: .8rem; color: var(--gray-500); margin-top: 2px; }
    .wl-item__price { font-weight: 700; color: var(--blue-700); margin-top: 4px; font-size: .9375rem; }
    .wl-item__actions { display: flex; gap: 8px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <main class="page-wrap">
    <div class="container" style="padding-top:36px;padding-bottom:64px">
      <div class="breadcrumb">
        <a href="/index.html">Home</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        <span>Wishlist</span>
      </div>
      <div class="flex-between mb-24">
        <h1>My Wishlists</h1>
        <button class="btn btn--primary btn--sm" id="new-wishlist-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
          New Wishlist
        </button>
      </div>
      <div class="wishlist-grid">
        <!-- Sidebar: list of wishlists -->
        <div class="card" style="overflow:visible">
          <div class="card__body" style="padding:10px">
            <div id="wishlist-tabs-list">
              <!-- populated by JS -->
            </div>
          </div>
        </div>
        <!-- Main: items of selected wishlist -->
        <div id="wishlist-main">
          <!-- populated by JS -->
        </div>
      </div>
    </div>
  </main>
  <div id="footer-root"></div>

  <!-- New wishlist modal -->
  <div class="modal" id="new-wishlist-modal">
    <div class="modal__box">
      <div class="modal__header">
        <h3>New Wishlist</h3>
        <span class="modal__close" onclick="Modal.close('new-wishlist-modal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label class="form-label">Name <span class="req">*</span></label>
          <input type="text" class="form-input" id="new-wl-name" placeholder="e.g. Birthday ideas">
        </div>
        <label style="display:flex;align-items:center;gap:10px;font-size:.875rem;cursor:pointer">
          <input type="checkbox" id="new-wl-public" style="accent-color:var(--blue-500);width:16px;height:16px">
          Make this wishlist public (shareable)
        </label>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" onclick="Modal.close('new-wishlist-modal')">Cancel</button>
        <button class="btn btn--primary" id="create-wl-btn">Create</button>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/wishlist.js"></script>
</body>
</html>
