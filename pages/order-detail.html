<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="nav-root"></div>
  <main class="page-wrap">
    <div class="container" style="padding-top:36px;padding-bottom:64px;max-width:780px">
      <div class="breadcrumb">
        <a href="/index.html">Home</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        <a href="/pages/account.html">My Account</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        <span>Order</span>
      </div>
      <div id="order-content">
        <div class="loader-wrap"><span class="spinner"></span><span class="loader-msg">Loading order…</span></div>
      </div>
    </div>
  </main>
  <div id="footer-root"></div>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script>
  const STATUS_BADGE = {
    pending:"badge--amber",paid:"badge--blue",shipped:"badge--blue",
    delivered:"badge--green",cancelled:"badge--gray",failed:"badge--red"
  };

  (async () => {
    await Layout.init();
    const orderId = getQueryParam("id");
    const content = document.getElementById("order-content");
    if (!orderId) { Loader.error(content, "No order ID provided."); return; }

    try {
      const order = await Orders.getOrder(orderId);
      document.title = `Order #${order.id.slice(0,8).toUpperCase()} — Macarti Gadgets`;

      content.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:24px">
          <div>
            <h2 style="margin:0">Order #${order.id.slice(0,8).toUpperCase()}</h2>
            <div style="color:var(--gray-500);font-size:.875rem;margin-top:4px">
              Placed ${new Date(order.created_at).toLocaleDateString("en-NG",{year:"numeric",month:"long",day:"numeric"})}
            </div>
          </div>
          <span class="badge ${STATUS_BADGE[order.status] || "badge--gray"}" style="font-size:.85rem;padding:6px 14px">${order.status}</span>
        </div>

        <div class="card" style="padding:0;margin-bottom:20px">
          <div style="padding:14px 20px;border-bottom:1px solid var(--gray-100)"><h4 style="margin:0">Items</h4></div>
          ${order.items.map(item => `
            <div style="display:flex;gap:14px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--gray-100)">
              <div style="width:56px;height:56px;border-radius:var(--radius-sm);background:var(--gray-100);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22" style="color:var(--gray-400)"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
              </div>
              <div style="flex:1">
                <div style="font-weight:600;color:var(--blue-900)">${item.product_name}</div>
                <div style="font-size:.8125rem;color:var(--gray-500)">Qty: ${item.quantity}</div>
              </div>
              <div style="font-weight:700;color:var(--blue-700)">${formatPrice(item.total_price)}</div>
            </div>`).join("")}
          <div style="display:flex;justify-content:space-between;padding:14px 20px;font-weight:700;font-size:1rem;color:var(--blue-900)">
            <span>Total</span>
            <span>${formatPrice(order.total_amount)}</span>
          </div>
        </div>

        <div class="card" style="padding:0;margin-bottom:20px">
          <div style="padding:14px 20px;border-bottom:1px solid var(--gray-100)"><h4 style="margin:0">Contact</h4></div>
          <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px;font-size:.9rem">
            <div style="display:flex;gap:10px"><span style="color:var(--gray-500);min-width:80px">Email</span><span>${order.email}</span></div>
            <div style="display:flex;gap:10px"><span style="color:var(--gray-500);min-width:80px">Phone</span><span>${order.phone_number || "—"}</span></div>
          </div>
        </div>

        ${order.status === "pending" || order.status === "failed" ? `
        <div class="card" style="padding:20px">
          <h4 style="margin-bottom:14px">Complete Payment</h4>
          <p style="font-size:.875rem;color:var(--gray-600);margin-bottom:16px">Choose a payment provider to pay for this order.</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn--primary" id="pay-flw-btn">Pay with Flutterwave</button>
            <button class="btn btn--outline" id="pay-ps-btn">Pay with Paystack</button>
          </div>
          <div id="pay-error" class="form-error" style="display:none;margin-top:10px"></div>
        </div>` : ""}

        <div style="margin-top:20px">
          <a href="/pages/account.html" class="btn btn--outline">← Back to Orders</a>
        </div>`;

      async function payWith(provider) {
        const errEl = document.getElementById("pay-error");
        if (errEl) errEl.style.display = "none";
        try {
          const res = await Payments.initializePayment(orderId, provider);
          if (res.payment_link) { Toast.success("Redirecting…"); setTimeout(() => { window.location.href = res.payment_link; }, 500); }
        } catch (err) {
          if (errEl) { errEl.textContent = err.message || "Payment init failed."; errEl.style.display = "block"; }
        }
      }
      document.getElementById("pay-flw-btn")?.addEventListener("click", () => payWith("flutterwave"));
      document.getElementById("pay-ps-btn")?.addEventListener("click", () => payWith("paystack"));
    } catch (err) {
      Loader.error(content, err.status === 404 ? "Order not found." : "Failed to load order.");
    }
  })();
  </script>
</body>
</html>
