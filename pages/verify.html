<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--blue-50)">
  <div style="background:white;border-radius:var(--radius-xl);padding:40px;max-width:440px;width:100%;box-shadow:var(--shadow-xl);text-align:center">
    <a href="/index.html" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:28px;text-decoration:none">
      <div class="logo-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
      <span class="logo-text">Macarti<span>.</span></span>
    </a>
    <div id="verify-content">
      <div class="loader-wrap"><span class="spinner"></span><span class="loader-msg">Verifying your email…</span></div>
    </div>
  </div>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
  (async () => {
    const uid   = new URLSearchParams(window.location.search).get("uid");
    const token = new URLSearchParams(window.location.search).get("token");
    const content = document.getElementById("verify-content");

    if (!uid || !token) {
      content.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.5" width="48" height="48" style="margin:0 auto 16px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <h3>Invalid Link</h3><p style="color:var(--gray-500);font-size:.9rem;margin-top:8px">This verification link is missing required parameters.</p>
        <a href="/pages/login.html" class="btn btn--primary" style="margin-top:20px">Go to Login</a>`;
      return;
    }

    try {
      await Auth.verifyEmail(uid, token);
      content.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" width="52" height="52" style="margin:0 auto 16px"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
        <h3 style="color:var(--success)">Email Verified!</h3>
        <p style="color:var(--gray-500);font-size:.9rem;margin-top:8px">Your account is now active. You can sign in.</p>
        <a href="/pages/login.html" class="btn btn--primary" style="margin-top:20px">Sign In</a>`;
    } catch (err) {
      content.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.5" width="48" height="48" style="margin:0 auto 16px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <h3>Verification Failed</h3>
        <p style="color:var(--gray-500);font-size:.9rem;margin-top:8px">${err.data?.detail || "This link may have expired or already been used."}</p>
        <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
          <p style="font-size:.875rem;color:var(--gray-600)">Need a new link?</p>
          <input type="email" class="form-input" id="resend-email" placeholder="your@email.com">
          <button class="btn btn--primary" id="resend-btn">Resend Verification</button>
        </div>`;
      document.getElementById("resend-btn")?.addEventListener("click", async () => {
        const email = document.getElementById("resend-email")?.value.trim();
        if (!email) return;
        try {
          await Auth.resendVerification(email);
          document.getElementById("resend-btn").textContent = "Sent! Check your inbox.";
          document.getElementById("resend-btn").disabled = true;
        } catch { alert("Failed to resend. Please try again."); }
      });
    }
  })();
  </script>
</body>
</html>
