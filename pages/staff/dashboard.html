<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/staff.css">
</head>
<body>
  <div id="nav-root"></div>

  <main class="page-wrap">
    <div class="staff-layout">
      <!-- Staff Sidebar -->
      <aside class="staff-sidebar" id="staff-sidebar">
        <div class="staff-sidebar__header">
          <span class="label" style="color:var(--blue-300)">Staff Panel</span>
        </div>
        <nav class="staff-nav">
          <a href="/pages/staff/dashboard.html" class="staff-nav-item active" data-page="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="/pages/staff/products.html" class="staff-nav-item" data-page="products">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Products
          </a>
          <a href="/pages/staff/categories.html" class="staff-nav-item" data-page="categories">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
            Categories
          </a>
          <a href="/pages/staff/inventory.html" class="staff-nav-item" data-page="inventory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8h14M5 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><path d="M9 15h6"/></svg>
            Inventory
          </a>
          <div class="staff-nav-divider"></div>
          <a href="/index.html" class="staff-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Back to Store
          </a>
        </nav>
      </aside>

      <!-- Main content -->
      <div class="staff-main">
        <div class="staff-topbar">
          <div>
            <h2 style="margin:0">Dashboard</h2>
            <p class="text-muted" style="font-size:.8125rem;margin-top:2px">Overview of your store</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="staff-stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-card__icon" style="background:rgba(26,82,200,.1);color:var(--blue-600)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </div>
            <div class="stat-card__body">
              <div class="stat-card__label">Total Products</div>
              <div class="stat-card__value" id="stat-products">—</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon" style="background:rgba(26,173,109,.1);color:var(--success)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
            </div>
            <div class="stat-card__body">
              <div class="stat-card__label">Categories</div>
              <div class="stat-card__value" id="stat-categories">—</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon" style="background:rgba(224,140,26,.1);color:var(--warning)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M5 8h14M5 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/></svg>
            </div>
            <div class="stat-card__body">
              <div class="stat-card__label">Variants</div>
              <div class="stat-card__value" id="stat-variants">—</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon" style="background:rgba(224,62,62,.1);color:var(--danger)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div class="stat-card__body">
              <div class="stat-card__label">Out of Stock</div>
              <div class="stat-card__value" id="stat-oos">—</div>
            </div>
          </div>
        </div>

        <!-- Recent products -->
        <div class="staff-section">
          <div class="staff-section__head">
            <h3>Recent Products</h3>
            <a href="/pages/staff/products.html" class="btn btn--outline btn--sm">Manage →</a>
          </div>
          <div class="staff-table-wrap">
            <table class="staff-table" id="recent-products-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Brand</th>
                  <th>Base Price</th>
                  <th>Category</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="recent-products-body">
                <tr><td colspan="5" style="text-align:center;padding:28px;color:var(--gray-400)">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Inventory log preview -->
        <div class="staff-section">
          <div class="staff-section__head">
            <h3>Recent Inventory Activity</h3>
            <a href="/pages/staff/inventory.html" class="btn btn--outline btn--sm">Full log →</a>
          </div>
          <div id="inventory-preview">
            <div class="loader-wrap"><span class="spinner"></span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/staff-common.js"></script>
  <script src="/js/staff-dashboard.js"></script>
</body>
</html>
