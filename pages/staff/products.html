<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Staff — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/staff.css">
</head>
<body>
  <div id="nav-root"></div>
  <main class="page-wrap">
    <div class="staff-layout">

      <!-- Sidebar -->
      <aside class="staff-sidebar">
        <div class="staff-sidebar__header"><span class="label" style="color:var(--blue-300)">Staff Panel</span></div>
        <nav class="staff-nav">
          <a href="/pages/staff/dashboard.html" class="staff-nav-item" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
          <a href="/pages/staff/products.html" class="staff-nav-item active" data-page="products"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Products</a>
          <a href="/pages/staff/categories.html" class="staff-nav-item" data-page="categories"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>Categories</a>
          <a href="/pages/staff/inventory.html" class="staff-nav-item" data-page="inventory"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8h14M5 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><path d="M9 15h6"/></svg>Inventory</a>
          <div class="staff-nav-divider"></div>
          <a href="/index.html" class="staff-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Back to Store</a>
        </nav>
      </aside>

      <!-- Main -->
      <div class="staff-main">
        <div class="staff-topbar">
          <div><h2 style="margin:0">Products</h2><p class="text-muted" style="font-size:.8125rem;margin-top:2px">Manage your product catalog</p></div>
          <button class="btn btn--primary" id="new-product-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
            New Product
          </button>
        </div>

        <!-- Products table section -->
        <div class="staff-section">
          <div class="staff-toolbar">
            <div class="staff-toolbar__search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="product-search" placeholder="Search products…">
            </div>
            <select class="form-select" id="product-category-filter" style="height:36px;font-size:.8125rem;min-width:160px">
              <option value="">All Categories</option>
            </select>
            <span class="text-muted" id="product-count" style="font-size:.8125rem;margin-left:auto"></span>
          </div>
          <div class="staff-table-wrap">
            <table class="staff-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Brand</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="products-tbody"></tbody>
            </table>
          </div>
          <div id="products-pagination" style="padding:12px 16px"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-root"></div>

  <!-- Product form modal -->
  <div class="modal" id="product-modal">
    <div class="modal__box modal__box--wide">
      <div class="modal__header">
        <h3 id="product-modal-title">New Product</h3>
        <span class="modal__close" onclick="Modal.close('product-modal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
      </div>
      <div class="modal__body" style="gap:14px">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Name <span class="req">*</span></label>
            <input type="text" class="form-input" id="pm-name" placeholder="e.g. iPhone 15 Pro">
          </div>
          <div class="form-group">
            <label class="form-label">Brand <span class="req">*</span></label>
            <input type="text" class="form-input" id="pm-brand" placeholder="e.g. Apple">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Base Price <span class="req">*</span></label>
            <input type="number" step="0.01" class="form-input" id="pm-price" placeholder="0.00">
          </div>
          <div class="form-group">
            <label class="form-label">Currency</label>
            <select class="form-select" id="pm-currency">
              <option value="NGN">NGN — Naira</option>
              <option value="USD">USD — Dollar</option>
              <option value="GBP">GBP — Pound</option>
              <option value="EUR">EUR — Euro</option>
              <option value="GHS">GHS — Cedis</option>
              <option value="KES">KES — Shilling</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="pm-category">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Slug</label>
            <input type="text" class="form-input" id="pm-slug" placeholder="auto-generated">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="pm-desc" rows="3" placeholder="Product description (max 400 chars)" maxlength="400"></textarea>
        </div>
        <div id="pm-error" class="form-error" style="display:none"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" onclick="Modal.close('product-modal')">Cancel</button>
        <button class="btn btn--primary" id="pm-save-btn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Variant management modal -->
  <div class="modal" id="variants-modal">
    <div class="modal__box modal__box--wide">
      <div class="modal__header">
        <h3>Manage Variants — <span id="variants-product-name"></span></h3>
        <span class="modal__close" onclick="Modal.close('variants-modal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
      </div>
      <div class="modal__body" style="gap:12px;max-height:70vh;overflow-y:auto">
        <div id="variants-list"></div>
        <div style="border-top:1px solid var(--gray-100);padding-top:16px">
          <h4 style="margin-bottom:12px;font-size:.9rem">Add New Variant</h4>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Color <span class="req">*</span></label><input type="text" class="form-input" id="vf-color" placeholder="e.g. Space Black"></div>
            <div class="form-group"><label class="form-label">Storage/Size</label><input type="text" class="form-input" id="vf-size" placeholder="e.g. 256GB"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Price <span class="req">*</span></label><input type="number" step="0.01" class="form-input" id="vf-price" placeholder="0.00"></div>
            <div class="form-group"><label class="form-label">Currency</label>
              <select class="form-select" id="vf-currency">
                <option value="NGN">NGN</option><option value="USD">USD</option><option value="GBP">GBP</option><option value="EUR">EUR</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Stock Quantity</label><input type="number" class="form-input" id="vf-stock" placeholder="0" min="0"></div>
            <div class="form-group"><label class="form-label">SKU Code</label><input type="text" class="form-input" id="vf-sku" placeholder="Optional"></div>
          </div>
          <div id="vf-error" class="form-error" style="display:none"></div>
          <button class="btn btn--primary btn--sm" id="vf-add-btn" style="margin-top:4px">Add Variant</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/staff-common.js"></script>
  <script src="/js/staff-products.js"></script>
</body>
</html>
