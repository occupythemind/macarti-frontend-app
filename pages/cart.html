<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Macarti Gadgets</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/cart.css">
</head>
<body>
  <div id="nav-root"></div>

  <main class="page-wrap">
    <div class="container" style="padding-top:36px;padding-bottom:64px">
      <div class="breadcrumb">
        <a href="/index.html">Home</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        <span>Cart</span>
      </div>

      <h1 style="margin-bottom:28px">Your Cart</h1>

      <div class="cart-layout" id="cart-layout">
        <!-- Populated by JS -->
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <!-- Checkout modal -->
  <div class="modal" id="checkout-modal">
    <div class="modal__box">
      <div class="modal__header">
        <h3>Complete Your Order</h3>
        <span class="modal__close" onclick="Modal.close('checkout-modal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </span>
      </div>
      <div class="modal__body">
        <p class="text-muted" style="font-size:.875rem">Enter your contact details to place the order.</p>
        <div class="form-group">
          <label class="form-label">Email <span class="req">*</span></label>
          <input type="email" class="form-input" id="checkout-email" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="checkout-phone" placeholder="+234 801 234 5678">
        </div>
        <div id="checkout-error" style="display:none" class="text-danger" style="font-size:.875rem"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" onclick="Modal.close('checkout-modal')">Cancel</button>
        <button class="btn btn--primary" id="checkout-submit-btn">
          Place Order →
        </button>
      </div>
    </div>
  </div>

  <!-- Payment modal -->
  <div class="modal" id="payment-modal">
    <div class="modal__box">
      <div class="modal__header">
        <h3>Choose Payment Method</h3>
        <span class="modal__close" onclick="Modal.close('payment-modal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </span>
      </div>
      <div class="modal__body">
        <p class="text-muted" style="font-size:.875rem">Select your preferred payment provider to complete your purchase.</p>
        <div id="payment-order-summary" style="background:var(--gray-50);border-radius:var(--radius-md);padding:14px;margin-bottom:4px"></div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="payment-provider-btn" id="pay-flutterwave">
            <!-- SUGGESTION: Replace text with Flutterwave SVG logo from their brand kit -->
            <div class="provider-icon" style="background:#f5a623;color:white">FW</div>
            <div>
              <div style="font-weight:700;font-size:.9rem">Flutterwave</div>
              <div style="font-size:.78rem;color:var(--gray-500)">Cards, Bank Transfer, USSD &amp; more</div>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="margin-left:auto;color:var(--gray-400)"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="payment-provider-btn" id="pay-paystack">
            <!-- SUGGESTION: Replace text with Paystack SVG logo from their brand kit -->
            <div class="provider-icon" style="background:#0ba4db;color:white">PS</div>
            <div>
              <div style="font-weight:700;font-size:.9rem">Paystack</div>
              <div style="font-size:.78rem;color:var(--gray-500)">Cards, Bank Transfer, USSD &amp; more</div>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="margin-left:auto;color:var(--gray-400)"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
        <div id="payment-error" class="text-danger" style="display:none;font-size:.875rem;margin-top:8px"></div>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/cart.js"></script>
</body>
</html>
